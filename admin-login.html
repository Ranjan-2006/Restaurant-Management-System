<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | RESTURANT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        .bg-gradient-animate {
            background: linear-gradient(-45deg, #4f46e5, #ec4899, #3b82f6, #10b981);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .animate-shake {
            animation: shake 0.3s ease-in-out 0s 2;
        }
    </style>
</head>

<body class="bg-gradient-animate min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md rounded-[2rem] shadow-2xl p-10 relative overflow-hidden">
        <!-- Decorative elements -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-indigo-500 rounded-full opacity-20 mix-blend-multiply filter blur-xl"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-pink-500 rounded-full opacity-20 mix-blend-multiply filter blur-xl"></div>
        
        <div class="text-center mb-10 relative z-10">
            <div class="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl text-white transform rotate-3 hover:rotate-0 transition-transform duration-300">
                <i class="fa-solid fa-user-shield text-4xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Admin Portal</h1>
            <p class="text-slate-500 mt-2 text-sm font-medium">Secure authentication required</p>
        </div>

        <form id="loginForm" class="space-y-6 relative z-10">
            <div>
                <label for="username" class="block text-sm font-bold text-slate-700 mb-2">Username</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-600">
                        <i class="fa-solid fa-user text-slate-400 group-focus-within:text-indigo-600 transition-colors"></i>
                    </div>
                    <input type="text" id="username" class="w-full pl-12 pr-4 py-3.5 bg-white/80 backdrop-blur-sm border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-sm placeholder-slate-400 font-medium" placeholder="Enter username" autocomplete="off">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-400 group-focus-within:text-indigo-600 transition-colors"></i>
                    </div>
                    <input type="password" id="password" class="w-full pl-12 pr-4 py-3.5 bg-white/80 backdrop-blur-sm border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-sm placeholder-slate-400 font-medium" placeholder="••••••••" autocomplete="off">
                </div>
            </div>

            <!-- Message Area -->
            <div id="messageArea" class="hidden rounded-xl p-4 text-sm font-bold text-center transition-all duration-300 transform scale-95 opacity-0"></div>

            <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-lg shadow-lg hover:shadow-indigo-500/30 transition-all transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 flex items-center justify-center group">
                <span>Authenticate</span>
                <i class="fa-solid fa-arrow-right ml-2 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-1 transition-all duration-300"></i>
            </button>
        </form>
        
        <div class="mt-8 text-center relative z-10">
            <a href="index.html" class="inline-flex items-center text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors px-4 py-2 rounded-lg hover:bg-indigo-50">
                <i class="fa-solid fa-arrow-left mr-2"></i> Back to Dashboard
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginExpiry = localStorage.getItem('admin_login_expiry');
            if (loginExpiry && Date.now() < parseInt(loginExpiry)) {
                // Already logged in, redirect
                const isSetup = localStorage.getItem('restaurant_setup_complete');
                if (isSetup === 'true') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'admin-setup.html';
                }
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msgArea = document.getElementById('messageArea');
            const submitBtn = document.querySelector('button[type="submit"]');
            
            // Reset message
            msgArea.className = 'hidden rounded-xl p-4 text-sm font-bold text-center transition-all duration-300 transform scale-95 opacity-0';
            
            if (user === 'admin' && pass === 'welcome@admin#1') {
                // Success
                // Set expiry to 88 hours from now
                localStorage.setItem('admin_login_expiry', Date.now() + 88 * 60 * 60 * 1000);
                
                msgArea.textContent = 'Credentials accepted. Redirecting...';
                msgArea.classList.remove('hidden', 'scale-95', 'opacity-0');
                msgArea.classList.add('bg-emerald-50', 'text-emerald-700', 'border', 'border-emerald-200', 'scale-100', 'opacity-100');
                
                // Disable button and add loading state
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Establishing Secure Connection...';
                submitBtn.classList.add('opacity-90', 'cursor-not-allowed', 'bg-emerald-600', 'hover:bg-emerald-600');
                submitBtn.classList.remove('hover:-translate-y-1', 'bg-indigo-600', 'hover:bg-indigo-700');
                
                setTimeout(() => {
                    // Navigate to setup or dashboard based on local storage
                    const isSetup = localStorage.getItem('restaurant_setup_complete');
                    if (isSetup === 'true') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'admin-setup.html';
                    }
                }, 2000);
            } else {
                // Error
                msgArea.textContent = 'Invalid credentials. Access denied.';
                msgArea.classList.remove('hidden', 'scale-95', 'opacity-0');
                msgArea.classList.add('bg-rose-50', 'text-rose-700', 'border', 'border-rose-200', 'scale-100', 'opacity-100');
                
                // Shake effect on form
                const form = document.getElementById('loginForm');
                form.classList.add('animate-shake');
                
                // Red focus on inputs momentarily
                const inputs = document.querySelectorAll('input');
                inputs.forEach(input => {
                    input.classList.add('border-rose-300', 'ring-2', 'ring-rose-200');
                });

                setTimeout(() => {
                    form.classList.remove('animate-shake');
                    inputs.forEach(input => {
                        input.classList.remove('border-rose-300', 'ring-2', 'ring-rose-200');
                    });
                }, 600);
            }
        });
    </script>
</body>

</html>
